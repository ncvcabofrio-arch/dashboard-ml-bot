name: Mutirao do mes (rodar 1x)

on:
  workflow_dispatch: {}

concurrency:
  group: ml-puxador
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests supabase
      - name: Rodar mutirao do mes
        env:
          ML_CLIENT_ID:     ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          DIAS: '31'              # só as vendas do mês (últimos 31 dias)
        run: python backfill_mes.py
